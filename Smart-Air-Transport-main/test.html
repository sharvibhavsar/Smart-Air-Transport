<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Air OCC - TransitOps Verification Tests</title>
  <style>
    body {
      background-color: #050b14;
      color: #f0f6fc;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 2rem;
      margin: 0;
    }
    .test-container {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(13, 24, 42, 0.85);
      border: 1px solid rgba(0, 240, 255, 0.15);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 2.0rem;
      color: #00f0ff;
      border-bottom: 2px solid rgba(0, 240, 255, 0.15);
      padding-bottom: 0.5rem;
      margin-top: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .summary {
      display: flex;
      gap: 2rem;
      margin: 1.5rem 0;
      font-size: 1.1rem;
      font-family: monospace;
    }
    .summary-item {
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .summary-item.passed {
      background: rgba(0, 255, 102, 0.1);
      border-color: rgba(0, 255, 102, 0.2);
      color: #00ff66;
    }
    .summary-item.failed {
      background: rgba(255, 0, 85, 0.1);
      border-color: rgba(255, 0, 85, 0.2);
      color: #ff0055;
    }
    .test-suite {
      margin-top: 2rem;
    }
    .suite-title {
      font-size: 1.2rem;
      color: #ffaa00;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      font-family: monospace;
    }
    .test-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      margin-bottom: 0.5rem;
      font-family: monospace;
    }
    .test-item.passed {
      border-left: 4px solid #00ff66;
    }
    .test-item.failed {
      border-left: 4px solid #ff0055;
    }
    .test-name {
      font-weight: bold;
    }
    .test-result {
      font-weight: bold;
    }
    .test-result.passed { color: #00ff66; }
    .test-result.failed { color: #ff0055; }
    .error-log {
      display: block;
      color: #ff88a8;
      font-size: 0.85rem;
      margin-top: 0.25rem;
      white-space: pre-wrap;
    }
  </style>
  <script src="app.js"></script>
</head>
<body>

  <div class="test-container">
    <h1>TransitOps System Verification Tests</h1>
    <p>Aviation compliance verification suite validating cargo capacities, pilot certifications, and aircraft statuses.</p>
    
    <div class="summary">
      <div class="summary-item" id="total-tests">Total: 0</div>
      <div class="summary-item passed" id="passed-tests">Passed: 0</div>
      <div class="summary-item failed" id="failed-tests">Failed: 0</div>
    </div>

    <div class="test-suite" id="test-list">
      <!-- Dynamic Test Results -->
    </div>
  </div>

  <script>
    const testList = document.getElementById("test-list");
    let totalCount = 0;
    let passCount = 0;
    let failCount = 0;

    function assert(condition, message) {
      if (!condition) {
        throw new Error(message || "Assertion Failed");
      }
    }

    function runSuite(name, testCases) {
      const suiteDiv = document.createElement("div");
      suiteDiv.style.marginBottom = "2rem";
      suiteDiv.innerHTML = `<div class="suite-title">Suite: ${name}</div>`;
      testList.appendChild(suiteDiv);

      for (const [testName, testFn] of Object.entries(testCases)) {
        totalCount++;
        const itemDiv = document.createElement("div");
        itemDiv.className = "test-item";
        
        try {
          testFn();
          passCount++;
          itemDiv.classList.add("passed");
          itemDiv.innerHTML = `
            <div>
              <span class="test-name">${testName}</span>
            </div>
            <span class="test-result passed">PASSED</span>
          `;
        } catch (e) {
          failCount++;
          itemDiv.classList.add("failed");
          itemDiv.innerHTML = `
            <div>
              <span class="test-name">${testName}</span>
              <span class="error-log">${e.message}</span>
            </div>
            <span class="test-result failed">FAILED</span>
          `;
        }
        suiteDiv.appendChild(itemDiv);
      }

      document.getElementById("total-tests").textContent = `Total: ${totalCount}`;
      document.getElementById("passed-tests").textContent = `Passed: ${passCount}`;
      document.getElementById("failed-tests").textContent = `Failed: ${failCount}`;
    }

    window.addEventListener("load", () => {
      // Suite 1: Registration Validation
      runSuite("Aircraft Registry Validations", {
        "Aircraft Reg Numbers must be unique": () => {
          // Pre-seeded VT-SAT01 exists. We simulate trying to add it again
          const reg = "VT-SAT01";
          const exists = !!state.aircraft[reg];
          assert(exists === true, "VT-SAT01 not found in pre-seeded registry");
        }
      });

      // Suite 2: Safety Compliance
      runSuite("Pilot Safety Certification Rules", {
        "Should block pilots with expired licenses": () => {
          const expiredPilotId = "PL-103"; // Expired in 2024
          const pilot = state.pilots[expiredPilotId];
          const isLicenseExpired = new Date(pilot.licenseExp) < new Date();
          assert(isLicenseExpired === true, "Failed to identify expired pilot license");
        },
        "Should block pilots with Suspended status": () => {
          // Add suspended pilot
          state.pilots["PL-SUSPENDED"] = { status: "Suspended", licenseExp: "2028-10-10", medicalExp: "2028-10-10" };
          const p = state.pilots["PL-SUSPENDED"];
          assert(p.status === "Suspended", "Pilot status is not Suspended");
        }
      });

      // Suite 3: Payload Capacity Engine
      runSuite("Cargo Trip Payload Constraints", {
        "Should reject dispatch if Cargo Weight exceeds Aircraft Capacity": () => {
          const ac = state.aircraft["VT-SAT01"]; // Cap 23,000 kg
          const cargoWeight = 25000;
          const exceedsLimit = cargoWeight > ac.payloadCap;
          assert(exceedsLimit === true, "Allowed cargo weight exceeding payload limit");
        }
      });

      // Suite 4: Maintenance Status Transition
      runSuite("Aircraft Maintenance Workflow", {
        "Filing maintenance grounds aircraft and changes status to In Maintenance": () => {
          // Ground VT-SAT03
          const reg = "VT-SAT03";
          state.aircraft[reg].status = "In Maintenance";
          assert(state.aircraft[reg].status === "In Maintenance", "Aircraft did not transition to In Maintenance status");
        }
      });
    });
  </script>
</body>
</html>
